name: Build & Release Desktop App

# Triggers only when toogoodapp/ files change on master push
on:
  push:
    branches: [master]
    paths:
      - 'toogoodapp/**'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: toogoodapp/package-lock.json

      - name: Install dependencies
        working-directory: toogoodapp
        run: npm ci

      - name: Build web bundle
        working-directory: toogoodapp
        run: npm run build:web

      - name: Build Windows installer
        working-directory: toogoodapp
        run: npx electron-builder --win --publish never

      - name: Read version from package.json
        id: ver
        working-directory: toogoodapp
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release & upload installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Too Good v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          files: |
            toogoodapp/desktop-build/TooGood-Setup.exe
            toogoodapp/desktop-build/TooGood-Setup.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest.yml on Render server
        shell: pwsh
        run: |
          $version  = "${{ steps.ver.outputs.version }}"
          $baseUrl  = "https://github.com/vnyss/metabollism/releases/download/v$version"
          $built    = Get-Content toogoodapp/desktop-build/latest.yml -Raw

          # Extract sha512 and size from the electron-builder-generated file
          $sha  = ([regex]'sha512: (.+)').Match($built).Groups[1].Value.Trim()
          $size = ([regex]'size: (\d+)').Match($built).Groups[1].Value.Trim()
          $date = ([regex]"releaseDate: '(.+)'").Match($built).Groups[1].Value.Trim()

          $yaml = @"
          version: $version
          files:
            - url: $baseUrl/TooGood-Setup.exe
              sha512: $sha
              size: $size
          path: $baseUrl/TooGood-Setup.exe
          sha512: $sha
          releaseDate: '$date'
          "@

          # Strip the leading indentation added by the here-string
          $yaml = ($yaml -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          $yaml | Set-Content static/downloads/latest.yml -Encoding utf8NoBOM

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/downloads/latest.yml
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: update latest.yml to v$version [skip ci]"
            git push
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
