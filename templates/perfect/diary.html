<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Diary — Too Good</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    <script>(function(){
        var r = document.documentElement;
        if (localStorage.getItem('tg_mode') === 'light') r.classList.add('light-mode');
        var sw = localStorage.getItem('tg_sw'); if (sw) r.style.setProperty('--sw', {narrow:'220px',normal:'260px',wide:'320px'}[sw]||'260px');
        var an = localStorage.getItem('tg_anim'); if (an) r.style.setProperty('--anim', {none:'0ms',normal:'200ms',snappy:'80ms'}[an]||'200ms');
    })();</script>
    <style>
        :root {
            --bg:#0A0A0A; --sidebar:#080808; --surface:#111111; --elevated:#181818;
            --border:rgba(201,168,76,0.12); --border-h:rgba(201,168,76,0.38);
            --gold:#C9A84C; --gold-h:#DFC070; --gold-dim:rgba(201,168,76,0.07);
            --text:#E8DCC8; --text-2:#8A7A62; --text-3:#4A3C2A;
            --mono:'Courier Prime',monospace; --display:'Special Elite',monospace;
            --sw:260px; --anim:200ms;
        }
        html.light-mode {
            --bg:#F5F0E8; --sidebar:#EDE8DF; --surface:#FFFFFF; --elevated:#F0EBE1;
            --border:rgba(100,80,40,0.14); --border-h:rgba(100,80,40,0.36);
            --gold-dim:rgba(201,168,76,0.10); --text:#1A1208; --text-2:#6B5A3E; --text-3:#9A8A72;
        }
        *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); font-family:var(--mono); color:var(--text); height:100vh; overflow:hidden; -webkit-font-smoothing:antialiased; }
        .app { display:flex; height:100vh; }

        /* ═══ SIDEBAR ═══ */
        .sidebar { width:var(--sw); min-width:var(--sw); background:var(--sidebar); border-right:1px solid var(--border); display:flex; flex-direction:column; height:100vh; position:fixed; left:0; top:0; z-index:100; }
        .sb-top { padding:14px 12px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .sb-brand { display:flex; align-items:center; gap:10px; text-decoration:none; margin-bottom:12px; }
        .sb-logo { width:26px; height:26px; flex-shrink:0; display:block; color:var(--gold); }
        .sb-brand-name { font-family:var(--display); font-size:15px; color:var(--text); letter-spacing:0.06em; }
        .new-chat-btn { width:100%; display:flex; align-items:center; gap:8px; padding:8px 10px; background:transparent; border:1px solid var(--border); color:var(--text-2); font-family:var(--mono); font-size:13px; letter-spacing:0.06em; cursor:pointer; transition:all 0.18s; }
        .new-chat-btn:hover { border-color:var(--border-h); color:var(--gold); background:var(--gold-dim); }
        .sb-nav { flex:1; overflow-y:auto; padding:8px 0 6px; }
        .sb-nav::-webkit-scrollbar { width:2px; }
        .sb-section-label { font-size:10px; color:var(--text-3); letter-spacing:0.24em; text-transform:uppercase; padding:12px 14px 4px; display:block; }
        .sb-item { display:flex; align-items:center; gap:9px; width:100%; padding:8px 14px; background:none; border:none; color:var(--text-2); font-family:var(--mono); font-size:13px; letter-spacing:0.025em; cursor:pointer; text-align:left; text-decoration:none; transition:background 0.15s,color 0.15s; }
        .sb-item:hover { background:var(--gold-dim); color:var(--text); }
        .sb-item.active { background:rgba(201,168,76,0.09); color:var(--gold); }
        .sb-item svg { flex-shrink:0; opacity:0.55; transition:opacity 0.15s; }
        .sb-item:hover svg,.sb-item.active svg { opacity:1; }
        .sb-sub { max-height:0; overflow:hidden; transition:max-height 0.28s ease; }
        .sb-sub.open { max-height:9999px; }
        .sb-sub-item { display:flex; align-items:center; gap:7px; padding:6px 14px 6px 38px; font-family:var(--mono); font-size:12px; color:var(--text-2); text-decoration:none; cursor:pointer; transition:background 0.15s,color 0.15s; border:none; background:none; width:100%; text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sb-sub-item:hover { background:var(--gold-dim); color:var(--text); }
        .sb-sub-item.highlight { color:var(--gold); }
        .sb-bottom { border-top:1px solid var(--border); padding:8px; flex-shrink:0; position:relative; }
        .profile-btn { display:flex; align-items:center; gap:10px; width:100%; padding:8px 10px; background:none; border:none; cursor:pointer; transition:background 0.15s; }
        .profile-btn:hover { background:var(--gold-dim); }
        .profile-avatar { width:28px; height:28px; background:rgba(201,168,76,0.12); border:1px solid var(--border-h); display:flex; align-items:center; justify-content:center; font-family:var(--display); font-size:13px; color:var(--gold); flex-shrink:0; }
        .profile-name { font-family:var(--mono); font-size:14px; color:var(--text); flex:1; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .profile-popup { display:none; position:absolute; bottom:calc(100% + 4px); left:8px; right:8px; background:var(--elevated); border:1px solid var(--border-h); z-index:200; }
        .profile-popup.open { display:block; }
        .pp-head { padding:14px; display:flex; align-items:flex-start; gap:10px; border-bottom:1px solid var(--border); }
        .pp-avatar { width:36px; height:36px; background:rgba(201,168,76,0.14); border:1px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:var(--display); font-size:17px; color:var(--gold); flex-shrink:0; }
        .pp-info { flex:1; min-width:0; }
        .pp-name { font-family:var(--display); font-size:15px; color:var(--text); display:block; margin-bottom:2px; }
        .pp-email { font-size:12px; color:var(--text-2); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
        .pp-since { font-size:11px; color:var(--text-3); letter-spacing:0.05em; display:block; }
        .pp-actions { padding:4px 0; }
        .pp-btn { display:block; width:100%; padding:8px 14px; background:none; border:none; font-family:var(--mono); font-size:13px; letter-spacing:0.05em; color:var(--text-2); text-align:left; cursor:pointer; text-decoration:none; transition:background 0.15s,color 0.15s; }
        .pp-btn:hover { background:var(--gold-dim); color:var(--text); }
        .pp-btn.red:hover { color:#e74c3c; }

        /* ═══ MAIN ═══ */
        .main { margin-left:var(--sw); flex:1; height:100vh; overflow-y:auto; display:flex; flex-direction:column; align-items:center; padding:40px 24px 60px; }
        .main::-webkit-scrollbar { width:4px; }
        .main::-webkit-scrollbar-thumb { background:var(--border); }

        /* ═══ GATE (PIN) ═══ */
        .gate-wrap { display:flex; flex-direction:column; align-items:center; gap:24px; margin-top:48px; text-align:center; }
        .gate-icon { color:var(--gold); opacity:0.75; }
        .gate-title { font-family:var(--display); font-size:22px; color:var(--text); letter-spacing:0.04em; }
        .gate-sub { font-size:12px; color:var(--text-2); line-height:1.7; max-width:300px; }

        /* PIN boxes */
        .pin-row { display:flex; gap:12px; justify-content:center; }
        .pin-box { width:56px; height:68px; background:var(--elevated); border:2px solid var(--border); color:var(--text); font-family:var(--mono); font-size:32px; text-align:center; outline:none; caret-color:transparent; transition:border-color 0.15s, box-shadow 0.15s; }
        .pin-box:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,0.15); }
        .pin-box.filled { border-color:var(--border-h); }
        @keyframes pinShake {
            0%,100% { transform:translateX(0); }
            11%     { transform:translateX(-9px); }
            22%     { transform:translateX(9px); }
            33%     { transform:translateX(-9px); }
            44%     { transform:translateX(9px); }
            55%     { transform:translateX(-9px); }
            66%     { transform:translateX(9px); }
            77%     { transform:translateX(0); }
        }
        @keyframes pinGlow {
            0%,100% { box-shadow:none; }
            15%     { box-shadow:0 0 18px rgba(231,76,60,0.8); }
            30%     { box-shadow:0 0 4px rgba(231,76,60,0.2); }
            45%     { box-shadow:0 0 18px rgba(231,76,60,0.8); }
            60%     { box-shadow:0 0 4px rgba(231,76,60,0.2); }
            75%     { box-shadow:0 0 18px rgba(231,76,60,0.8); }
            90%     { box-shadow:0 0 4px rgba(231,76,60,0.2); }
        }
        .pin-row.wrong { animation:pinShake 0.8s ease; }
        .pin-row.wrong .pin-box { border-color:#e74c3c !important; animation:pinGlow 0.8s ease; }

        .gate-no-pin { background:none; border:none; color:var(--text-3); font-family:var(--mono); font-size:12px; letter-spacing:0.08em; cursor:pointer; padding:6px 12px; transition:color 0.15s; text-decoration:underline; }
        .gate-no-pin:hover { color:var(--text-2); }
        .gate-hint { font-size:11px; color:var(--text-3); font-family:var(--mono); letter-spacing:0.06em; min-height:16px; transition:color 0.2s; }
        .gate-hint.err { color:#e74c3c; }

        /* ═══ NOTEBOOK ═══ */
        .notebook-outer { width:100%; max-width:760px; background:var(--surface); border:1px solid var(--border); display:flex; flex-direction:column; }

        .nb-header { height:52px; display:flex; align-items:center; padding:0 20px; gap:12px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .nb-date-nav { background:none; border:none; color:var(--text-3); font-size:20px; cursor:pointer; padding:0 4px; line-height:1; transition:color 0.15s; }
        .nb-date-nav:hover:not(:disabled) { color:var(--gold); }
        .nb-date-nav:disabled { opacity:0.2; cursor:default; }
        .nb-date-label { font-family:var(--display); font-size:16px; color:var(--text); letter-spacing:0.05em; flex:1; }
        .nb-lock-btn { background:none; border:none; color:var(--text-3); font-family:var(--mono); font-size:10px; letter-spacing:0.1em; cursor:pointer; display:flex; align-items:center; gap:4px; transition:color 0.15s; text-transform:uppercase; }
        .nb-lock-btn:hover { color:var(--gold); }

        .nb-body { flex:1; padding:0 20px; }
        .nb-ta { width:100%; min-height:380px; background:transparent; border:none; outline:none; resize:none; font-family:var(--mono); font-size:15px; line-height:1.85; color:var(--text); padding:16px 0; letter-spacing:0.02em; }
        .nb-ta::placeholder { color:var(--text-3); font-style:italic; }
        .nb-ta:disabled { opacity:0.5; }

        .nb-toolbar { display:flex; align-items:center; gap:10px; padding:10px 20px; border-top:1px solid var(--border); flex-shrink:0; }
        .nb-wave { display:flex; align-items:center; gap:2px; height:22px; opacity:0; transition:opacity 0.2s; pointer-events:none; }
        .nb-wave.active { opacity:1; }
        .nb-wave-bar { width:3px; height:4px; background:var(--gold); border-radius:2px; }
        .nb-wave.active .nb-wave-bar { animation:nbWave 0.8s ease-in-out infinite; }
        .nb-wave.active .nb-wave-bar:nth-child(2) { animation-delay:0.1s; }
        .nb-wave.active .nb-wave-bar:nth-child(3) { animation-delay:0.2s; }
        .nb-wave.active .nb-wave-bar:nth-child(4) { animation-delay:0.3s; }
        .nb-wave.active .nb-wave-bar:nth-child(5) { animation-delay:0.4s; }
        @keyframes nbWave { 0%,100%{height:4px;opacity:0.35} 50%{height:20px;opacity:1} }

        .nb-mic-btn { background:none; border:1px solid var(--border); color:var(--text-3); width:32px; height:32px; cursor:pointer; display:grid; place-items:center; transition:all 0.15s; flex-shrink:0; }
        .nb-mic-btn:hover,.nb-mic-btn.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
        .nb-chars { font-size:11px; color:var(--text-3); font-family:var(--mono); flex:1; letter-spacing:0.04em; }
        .nb-save-btn { background:var(--gold); border:none; color:#060606; font-family:var(--mono); font-size:12px; letter-spacing:0.08em; font-weight:700; padding:7px 18px; cursor:pointer; transition:background 0.15s; }
        .nb-save-btn:hover { background:var(--gold-h); }
        .nb-lock-diary-btn { background:none; border:1px solid rgba(207,102,121,0.35); color:var(--red,#CF6679); font-family:var(--mono); font-size:11px; letter-spacing:0.08em; padding:6px 14px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:background 0.15s; }
        .nb-lock-diary-btn:hover { background:rgba(207,102,121,0.08); }
        .nb-saved { font-size:11px; color:var(--text-3); font-family:var(--mono); letter-spacing:0.06em; opacity:0; transition:opacity 0.3s; }
        .nb-saved.show { opacity:1; }

        .nb-ai-bar { display:flex; align-items:center; gap:12px; padding:10px 20px; background:var(--elevated); border-top:1px solid var(--border); flex-shrink:0; }
        .nb-ai-btn { display:flex; align-items:center; gap:7px; background:none; border:1px solid var(--border); color:var(--text-2); font-family:var(--mono); font-size:12px; letter-spacing:0.06em; padding:7px 14px; cursor:pointer; transition:all 0.15s; }
        .nb-ai-btn:hover:not(:disabled) { border-color:var(--border-h); color:var(--gold); background:var(--gold-dim); }
        .nb-ai-btn:disabled { opacity:0.45; cursor:default; }

        .nb-ai-panel { display:none; padding:16px 20px; background:var(--elevated); border-top:1px solid var(--border); font-family:var(--mono); font-size:13px; color:var(--text); line-height:1.8; white-space:pre-wrap; }
        .nb-ai-panel.show { display:block; }
        .nb-ai-thinking { display:flex; gap:5px; align-items:center; }
        .dai-dot { width:6px; height:6px; background:var(--gold); border-radius:50%; animation:daiP 1.2s ease-in-out infinite; }
        .dai-dot:nth-child(2) { animation-delay:0.2s; }
        .dai-dot:nth-child(3) { animation-delay:0.4s; }
        @keyframes daiP { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }

        /* Toast */
        .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--elevated); border:1px solid var(--border-h); color:var(--text); font-family:var(--mono); font-size:13px; letter-spacing:0.04em; padding:10px 22px; z-index:9999; opacity:0; transition:opacity 0.25s,transform 0.25s; pointer-events:none; white-space:nowrap; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        /* Mobile */
        .mob-toggle { display:none; position:fixed; top:12px; left:12px; z-index:200; background:var(--surface); border:1px solid var(--border); color:var(--text-2); width:36px; height:36px; cursor:pointer; display:grid; place-items:center; }
        @media(max-width:768px) {
            .sidebar { transform:translateX(-100%); transition:transform 0.25s; }
            .sidebar.mob-open { transform:translateX(0); }
            .main { margin-left:0; padding-top:56px; padding-left:12px; padding-right:12px; }
            .mob-toggle { display:grid; }
        }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>
<button class="mob-toggle" onclick="document.getElementById('sidebar').classList.toggle('mob-open')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<div class="app">
    <!-- SIDEBAR -->
    {% include 'perfect/_sidebar.html' %}

    <!-- MAIN -->
    <div class="main" id="mainScroll">

        <!-- Setup PIN gate -->
        <div class="gate-wrap" id="gateSetup">
            <div class="gate-icon">
                <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </div>
            <h2 class="gate-title">Welcome to your diary</h2>
            <p class="gate-sub">Would you like to protect it with a 4-digit PIN?</p>

            <!-- Choice buttons shown first -->
            <div id="setupChoices" style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:260px;">
                <button class="nb-save-btn" style="width:100%;padding:12px;font-size:13px;" onclick="showSetupPin()">
                    Set a 4-digit PIN
                </button>
                <button onclick="diaryNoPin()" style="width:100%;padding:12px;background:none;border:1px solid var(--border);color:var(--text-2);font-family:var(--mono);font-size:13px;letter-spacing:0.06em;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--border-h)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-2)'">
                    Open without PIN
                </button>
            </div>

            <!-- PIN boxes shown only after choosing -->
            <div id="setupPinArea" style="display:none;flex-direction:column;align-items:center;gap:16px;">
                <div class="pin-row" id="setupPinRow">
                    <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="0">
                    <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="1">
                    <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="2">
                    <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="3">
                </div>
                <div class="gate-hint" id="setupHint">Enter a 4-digit PIN</div>
                <button class="gate-no-pin" onclick="backToChoices()">← Go back</button>
            </div>
        </div>

        <!-- Unlock PIN gate -->
        <div class="gate-wrap" id="gateUnlock" style="display:none">
            <div class="gate-icon">
                <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h2 class="gate-title">Diary is locked</h2>
            <p class="gate-sub">Enter your 4-digit PIN to open.</p>
            <div class="pin-row" id="unlockPinRow">
                <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="0">
                <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="1">
                <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="2">
                <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="3">
            </div>
            <div class="gate-hint" id="unlockHint"> </div>
            <button class="gate-no-pin" onclick="resetDiaryLock()">Forgot PIN? Reset lock</button>
        </div>

        <!-- Notebook editor -->
        <div class="notebook-outer" id="notebookWrap" style="display:none">
            <div class="nb-header">
                <button class="nb-date-nav" id="nbPrevBtn" onclick="diaryChangeDay(-1)" title="Previous day">‹</button>
                <span class="nb-date-label" id="nbDateLabel">Today</span>
                <button class="nb-date-nav" id="nbNextBtn" onclick="diaryChangeDay(1)" title="Next day">›</button>
                <button class="nb-lock-btn" onclick="diaryChangeLock()" title="Set or change PIN" id="nbLockBtn">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <span id="nbLockLabel">Set PIN</span>
                </button>
            </div>
            <div class="nb-body">
                <textarea class="nb-ta" id="nbTa"
                    placeholder="Write your thoughts here…"
                    oninput="diaryAutoSave()"
                    onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey)){saveDiaryEntry();event.preventDefault();}"></textarea>
            </div>
            <div class="nb-toolbar">
                <div class="nb-wave" id="nbWave">
                    <div class="nb-wave-bar"></div><div class="nb-wave-bar"></div>
                    <div class="nb-wave-bar"></div><div class="nb-wave-bar"></div>
                    <div class="nb-wave-bar"></div>
                </div>
                <button class="nb-mic-btn" id="nbMicBtn" onclick="toggleDiaryMic()" title="Dictate">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="21" x2="12" y2="17"/></svg>
                </button>
                <span class="nb-chars" id="nbChars">0 chars</span>
                <span class="nb-saved" id="nbSaved">Saved ✓</span>
                <button class="nb-lock-diary-btn" id="nbLockDiaryBtn" onclick="diaryLock()" title="Lock diary" style="display:none">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Lock
                </button>
                <button class="nb-save-btn" onclick="saveDiaryEntry()">Save</button>
            </div>
            <div class="nb-ai-bar">
                <button class="nb-ai-btn" id="nbAiBtn" onclick="diaryAiReview()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
                    Let AI review my day
                </button>
            </div>
            <div class="nb-ai-panel" id="nbAiPanel"></div>
        </div>

    </div><!-- /main -->
</div><!-- /app -->

<script>
(function () {
    const USERNAME    = {{ username | tojson }};

    let _date      = new Date().toISOString().slice(0, 10);
    let _unlocked  = false;
    let _setupPin  = '';   // PIN entered in setup step 1
    let _setupStep = 1;    // 1=enter new PIN, 2=confirm PIN
    let _mic = null, _micOn = false, _micFinal = '';
    let _saveTimer = null;

    /* ── helpers ── */
    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }
    function todayISO() { return new Date().toISOString().slice(0, 10); }

    async function sha256(str) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }
    function getPinData()  { return JSON.parse(localStorage.getItem('tg_diary_pin_' + USERNAME) || 'null'); }
    function savePinData(d){ localStorage.setItem('tg_diary_pin_' + USERNAME, JSON.stringify(d)); }
    function getDiaryEntries() { return JSON.parse(localStorage.getItem('tg_diary_' + USERNAME) || '{}'); }
    function saveDiaryEntries(e){ localStorage.setItem('tg_diary_' + USERNAME, JSON.stringify(e)); }

    function fmtDate(iso) {
        const today = todayISO();
        const yest  = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
        if (iso === today) return 'Today';
        if (iso === yest)  return 'Yesterday';
        const d = new Date(iso + 'T12:00:00');
        return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    /* ── views ── */
    function showView(v) {
        document.getElementById('gateSetup').style.display    = v === 'setup'    ? '' : 'none';
        document.getElementById('gateUnlock').style.display   = v === 'unlock'   ? '' : 'none';
        document.getElementById('notebookWrap').style.display = v === 'notebook' ? '' : 'none';
        if (v === 'setup')    { _setupStep = 1; _setupPin = ''; backToChoices(); }
        if (v === 'unlock')   focusPinRow('unlockPinRow');
        if (v === 'notebook') loadEntry();
    }

    window.showSetupPin = function () {
        document.getElementById('setupChoices').style.display  = 'none';
        document.getElementById('setupPinArea').style.display  = 'flex';
        document.getElementById('setupHint').textContent = 'Enter a 4-digit PIN';
        document.getElementById('setupHint').classList.remove('err');
        focusPinRow('setupPinRow');
    };

    window.backToChoices = function () {
        document.getElementById('setupChoices').style.display = 'flex';
        document.getElementById('setupPinArea').style.display = 'none';
        _setupStep = 1; _setupPin = '';
    };

    window.resetDiaryLock = async function () {
        if (!confirm('This will remove your PIN. Your diary entries will stay safe.')) return;
        savePinData({ enabled: false, hash: null });
        _unlocked = false; _setupStep = 1; _setupPin = '';
        showView('setup');
    };

    /* ── PIN input wiring ── */
    function focusPinRow(rowId) {
        const boxes = document.querySelectorAll(`#${rowId} .pin-box`);
        boxes.forEach(b => b.value = '');
        setTimeout(() => boxes[0] && boxes[0].focus(), 80);
    }

    function wirePinRow(rowId, onComplete) {
        const row   = document.getElementById(rowId);
        const boxes = Array.from(row.querySelectorAll('.pin-box'));
        boxes.forEach((box, i) => {
            box.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !box.value && i > 0) {
                    boxes[i - 1].value = '';
                    boxes[i - 1].classList.remove('filled');
                    boxes[i - 1].focus();
                    e.preventDefault();
                }
                if (e.key === 'ArrowLeft' && i > 0)  { boxes[i-1].focus(); e.preventDefault(); }
                if (e.key === 'ArrowRight' && i < 3) { boxes[i+1].focus(); e.preventDefault(); }
            });
            box.addEventListener('input', e => {
                const val = box.value.replace(/\D/g, '').slice(-1);
                box.value = val;
                box.classList.toggle('filled', !!val);
                if (val && i < 3) boxes[i + 1].focus();
                if (val && i === 3) {
                    const pin = boxes.map(b => b.value).join('');
                    if (pin.length === 4) onComplete(pin, row, boxes);
                }
            });
            box.addEventListener('paste', e => {
                e.preventDefault();
                const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,4);
                text.split('').forEach((ch, j) => { if (boxes[j]) { boxes[j].value = ch; boxes[j].classList.add('filled'); } });
                if (text.length === 4) onComplete(text, row, boxes);
                else if (text.length < 4 && boxes[text.length]) boxes[text.length].focus();
            });
        });
    }

    function shakePinRow(row, boxes, onDone) {
        boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
        row.classList.remove('wrong');
        void row.offsetWidth; /* reflow to restart animation */
        row.classList.add('wrong');
        setTimeout(() => { row.classList.remove('wrong'); if (onDone) onDone(); }, 900);
    }

    /* ── Setup flow ── */
    wirePinRow('setupPinRow', async (pin, row, boxes) => {
        if (_setupStep === 1) {
            _setupPin  = pin;
            _setupStep = 2;
            document.getElementById('setupHint').textContent = 'Confirm your PIN';
            document.getElementById('setupHint').classList.remove('err');
            boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
            setTimeout(() => boxes[0].focus(), 60);
        } else {
            if (pin === _setupPin) {
                const h = await sha256(pin);
                savePinData({ enabled: true, hash: h });
                _unlocked = true;
                showView('notebook');
                toast('PIN set. Diary unlocked.');
            } else {
                document.getElementById('setupHint').textContent = 'PINs don\'t match — try again';
                document.getElementById('setupHint').classList.add('err');
                shakePinRow(row, boxes, () => {
                    _setupStep = 1; _setupPin = '';
                    document.getElementById('setupHint').textContent = 'Enter a 4-digit PIN';
                    document.getElementById('setupHint').classList.remove('err');
                    setTimeout(() => boxes[0].focus(), 60);
                });
            }
        }
    });

    window.diaryNoPin = async function () {
        savePinData({ enabled: false, hash: null });
        _unlocked = true;
        showView('notebook');
    };

    /* ── Unlock flow ── */
    wirePinRow('unlockPinRow', async (pin, row, boxes) => {
        const pd = getPinData();
        const h  = await sha256(pin);
        const res = { valid: pd && pd.hash === h };
        if (res.valid) {
            _unlocked = true;
            showView('notebook');
        } else {
            document.getElementById('unlockHint').textContent = 'Wrong PIN';
            document.getElementById('unlockHint').classList.add('err');
            shakePinRow(row, boxes, () => {
                document.getElementById('unlockHint').textContent = ' ';
                document.getElementById('unlockHint').classList.remove('err');
                setTimeout(() => document.querySelector('#unlockPinRow .pin-box').focus(), 60);
            });
        }
    });

    /* ── Entry management ── */
    async function loadEntry() {
        const ta = document.getElementById('nbTa');
        ta.value = '';
        ta.disabled = true;
        document.getElementById('nbDateLabel').textContent = fmtDate(_date);
        document.getElementById('nbNextBtn').disabled = _date >= todayISO();
        document.getElementById('nbAiPanel').classList.remove('show');
        try {
            const entries = getDiaryEntries();
            ta.value = entries[_date] || '';
        } catch {}
        ta.disabled = false;
        ta.style.height = 'auto';
        ta.style.height = Math.max(380, ta.scrollHeight) + 'px';
        document.getElementById('nbChars').textContent = ta.value.length + ' chars';
    }

    window.saveDiaryEntry = async function (silent) {
        if (!_unlocked) return;
        const ta = document.getElementById('nbTa');
        const _entries = getDiaryEntries();
        const _text = ta.value;
        if (_text.trim()) _entries[_date] = _text; else delete _entries[_date];
        saveDiaryEntries(_entries);
        if (!silent) {
            const n = document.getElementById('nbSaved');
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 1800);
        }
    };

    window.diaryAutoSave = function () {
        clearTimeout(_saveTimer);
        _saveTimer = setTimeout(() => window.saveDiaryEntry(true), 1500);
        const ta = document.getElementById('nbTa');
        ta.style.height = 'auto';
        ta.style.height = Math.max(380, ta.scrollHeight) + 'px';
        document.getElementById('nbChars').textContent = ta.value.length + ' chars';
    };

    window.diaryChangeDay = function (delta) {
        window.saveDiaryEntry(true);
        const d = new Date(_date + 'T12:00:00');
        d.setDate(d.getDate() + delta);
        const next = d.toISOString().slice(0, 10);
        if (next > todayISO()) return;
        _date = next;
        loadEntry();
    };

    window.diaryChangeLock = function () {
        window.saveDiaryEntry(true);
        _unlocked = false;
        showView('setup');
    };

    window.diaryLock = function () {
        window.saveDiaryEntry(true);
        _unlocked = false;
        showView('unlock');
    };

    /* ── Mic ── */
    window.toggleDiaryMic = function () {
        if (_micOn) { stopMic(); return; }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { toast('Mic not supported in this browser.'); return; }
        _mic = new SR();
        _mic.continuous = true; _mic.interimResults = true; _mic.lang = 'en-US';
        _micFinal = document.getElementById('nbTa').value;
        _mic.onresult = e => {
            let interim = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) _micFinal += e.results[i][0].transcript + ' ';
                else interim += e.results[i][0].transcript;
            }
            const ta = document.getElementById('nbTa');
            ta.value = _micFinal + interim;
            ta.style.height = 'auto'; ta.style.height = Math.max(380, ta.scrollHeight) + 'px';
            document.getElementById('nbChars').textContent = ta.value.length + ' chars';
        };
        _mic.onerror = () => stopMic();
        _mic.onend   = () => { if (_micOn) _mic.start(); };
        _mic.start();
        _micOn = true;
        document.getElementById('nbMicBtn').classList.add('active');
        document.getElementById('nbWave').classList.add('active');
    };

    function stopMic() {
        _micOn = false;
        if (_mic) { _mic.onend = null; _mic.stop(); _mic = null; }
        document.getElementById('nbMicBtn').classList.remove('active');
        document.getElementById('nbWave').classList.remove('active');
        window.saveDiaryEntry(true);
    }

    /* ── AI Review ── */
    window.diaryAiReview = async function () {
        const diaryText = document.getElementById('nbTa').value.trim();
        const btn   = document.getElementById('nbAiBtn');
        const panel = document.getElementById('nbAiPanel');

        /* Build context from localStorage */
        let context = '';

        /* Today's nutrition log */
        try {
            const logs = JSON.parse(localStorage.getItem('toogood_daily_logs_' + USERNAME)) || [];
            const todayLog = logs.find(l => l.date === _date);
            if (todayLog) {
                context += '\n\n📊 TODAY\'S LOG:\n';
                if (todayLog.calories)  context += `• Calories: ${todayLog.calories} kcal\n`;
                if (todayLog.protein)   context += `• Protein: ${todayLog.protein}g\n`;
                if (todayLog.carbs)     context += `• Carbs: ${todayLog.carbs}g\n`;
                if (todayLog.fat)       context += `• Fat: ${todayLog.fat}g\n`;
                if (todayLog.steps)     context += `• Steps: ${todayLog.steps}\n`;
                if (todayLog.workout)   context += `• Workout: ${todayLog.workout}\n`;
                if (todayLog.hunger)    context += `• Hunger level: ${todayLog.hunger}/10\n`;
                if (todayLog.energy)    context += `• Energy level: ${todayLog.energy}/10\n`;
                if (todayLog.weight)    context += `• Weight: ${todayLog.weight} kg\n`;
                if (todayLog.foods && todayLog.foods.length) {
                    context += `• Foods eaten: ${todayLog.foods.map(f => f.name + (f.serving ? ' ('+f.serving+')' : '')).join(', ')}\n`;
                }
            }
        } catch {}

        /* Recent AI questions from today */
        try {
            const sessions = JSON.parse(localStorage.getItem(`toogood_sessions_${USERNAME}`)) || [];
            const todayMsgs = [];
            sessions.forEach(sess => {
                (sess.messages || []).forEach(m => {
                    if (m.role === 'user' && (sess.updatedAt || '').slice(0,10) === _date) {
                        todayMsgs.push(m.content);
                    }
                });
            });
            if (todayMsgs.length) {
                context += '\n\n💬 QUESTIONS YOU ASKED THE AI TODAY:\n';
                todayMsgs.slice(-5).forEach(q => { context += `• ${q.slice(0, 120)}\n`; });
            }
        } catch {}

        const message = 'Please review my day and give thoughtful, personal feedback based on everything below.'
            + (diaryText ? `\n\n📔 MY DIARY ENTRY:\n${diaryText}` : '')
            + context
            + '\n\nBe warm, personal and encouraging. Point out what went well and any gentle suggestions.';

        if (!diaryText && !context) { toast('Write a diary entry or log something first.'); return; }

        btn.disabled = true;
        panel.innerHTML = '<div class="nb-ai-thinking"><div class="dai-dot"></div><div class="dai-dot"></div><div class="dai-dot"></div></div>';
        panel.classList.add('show');

        try {
            const res  = await fetch('/perfect/api/assistant', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ history: [], message, diary_review: true })
            });
            const data = await res.json();
            const reply = data.reply || 'No response from AI.';
            panel.innerHTML = '';

            const txt = document.createElement('div');
            txt.style.cssText = 'white-space:pre-wrap;margin-bottom:14px;';
            txt.textContent = reply;
            panel.appendChild(txt);

            const addBtn = document.createElement('button');
            addBtn.textContent = 'Add to today\'s record';
            addBtn.style.cssText = 'display:inline-flex;align-items:center;gap:6px;background:var(--gold);border:none;color:#060606;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:0.08em;padding:7px 16px;cursor:pointer;';
            addBtn.onclick = async function () {
                const ta = document.getElementById('nbTa');
                const sep = '\n\n— AI Review —\n';
                ta.value = (ta.value.trim() ? ta.value.trim() + sep : sep) + reply;
                ta.style.height = 'auto';
                ta.style.height = Math.max(380, ta.scrollHeight) + 'px';
                await window.saveDiaryEntry(false);
                addBtn.textContent = 'Added ✓';
                addBtn.disabled = true;
                addBtn.style.opacity = '0.6';
            };
            panel.appendChild(addBtn);
        } catch {
            panel.textContent = 'Could not reach the AI. Check your connection and try again.';
        }
        btn.disabled = false;
    };

    /* ── AI sessions in sidebar ── */
    (function () {
        const SK = `toogood_sessions_${USERNAME}`;
        function shortTitle(t) { return t.length > 28 ? t.slice(0, 27) + '…' : t; }
        function render() {
            const sessions = (() => { try { return JSON.parse(localStorage.getItem(SK)) || []; } catch { return []; } })();
            const el = document.getElementById('sbAiSessions');
            if (!el) return;
            if (!sessions.length) { el.innerHTML = '<div style="padding:6px 14px 6px 38px;font-size:12px;color:var(--text-3);font-style:italic;">No sessions yet</div>'; return; }
            el.innerHTML = sessions.slice(0, 8).map(s =>
                `<a class="sb-sub-item" href="/perfect/ai" onclick="sessionStorage.setItem('aiLoadSession','${s.id}')" title="${s.title}" style="padding-left:38px;">${shortTitle(s.title)}</a>`
            ).join('');
        }
        window.toggleAiSessions = function (btn) {
            const sub  = document.getElementById('sbAiSub');
            const chev = document.getElementById('sbAiChevron');
            const open = sub.classList.toggle('open');
            chev.classList.toggle('flipped', open);
            if (open) render();
        };
        render();
    })();

    /* ── Profile popup ── */
    window.toggleProfile = function (e) {
        e.stopPropagation();
        document.getElementById('profilePopup').classList.toggle('open');
    };
    document.addEventListener('click', e => {
        const p = document.getElementById('profilePopup');
        const b = document.getElementById('profileBtn');
        if (p && !p.contains(e.target) && b && !b.contains(e.target)) p.classList.remove('open');
    });

    /* ── Init ── */
    (async () => {
        try {
            const pd = getPinData();
            const setupDone = pd !== null;
            const enabled   = pd && pd.enabled;
            const lockLabel = document.getElementById('nbLockLabel');
            if (lockLabel) lockLabel.textContent = enabled ? 'Change PIN' : 'Set PIN';
            const lockDiaryBtn = document.getElementById('nbLockDiaryBtn');
            if (lockDiaryBtn) lockDiaryBtn.style.display = enabled ? '' : 'none';
            if (!setupDone) showView('setup');
            else if (enabled) showView('unlock');
            else { _unlocked = true; showView('notebook'); }
        } catch {
            showView('setup');
        }
    })();
})();
</script>
</body>
</html>
